      height: 500px;

      z-index: 998;
      overflow: hidden;
    }

    .chatbot-window.active {

    }

    .chatbot-header {

      color: white;
      padding: 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;

      50% { opacity: 0.7; }

      background: #e0f2f1;
      padding: 6px 10px;

</head>

  };

  function detectLocations(text) {
  let found = [];

  for (const [location, variants] of Object.entries(locationVariants)) {
    for (const variant of variants) {
      if (text.toLowerCase().includes(variant.toLowerCase())) {
        found.push(location);
        break;
      }
    }
  }

  return [...new Set(found)];
}

  // ============ SPEECH RECOGNITION ============
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.continuous = false;        // Keep listening for multiple phrases
  recognition.interimResults = false;    // Get real-time results
  recognition.maxAlternatives = 1;      // Get best match only
  recognition.lang = "en-US";
  
  let listeningTimeout = null;
  let listeningStartTime = null;
  const LISTENING_DURATION = 60000;     // 60 seconds in milliseconds

  function startListening() {
    const micBtn = document.getElementById("micBtn");
    micBtn.classList.add("listening");
    micBtn.textContent = "🎤 Listening... (60s)";
    
    // Spoken feedback on mic start
    const prompt = "Welcome! How can I help you? Please say your pickup and drop location.";
    speakText(prompt);
    
    listeningStartTime = Date.now();
    
    // Start listening
    recognition.start();
    
    // Auto-stop after 60 seconds
    listeningTimeout = setTimeout(() => {
      stopListening();
    }, LISTENING_DURATION);
    
    // Update timer display
    const timerInterval = setInterval(() => {
      if (!micBtn.classList.contains("listening")) {
        clearInterval(timerInterval);
        return;
      }
      const elapsed = Math.floor((Date.now() - listeningStartTime) / 1000);
      const remaining = 60 - elapsed;
      micBtn.textContent = `🎤 Listening... (${remaining}s)`;
    }, 1000);
  }

  function stopListening() {
    const micBtn = document.getElementById("micBtn");
    micBtn.classList.remove("listening");
    micBtn.textContent = "🎤";
    
    if (listeningTimeout) {
      clearTimeout(listeningTimeout);
    }
    
    try {
      recognition.stop();
    } catch (e) {
      // Already stopped
    }
  }

  recognition.onstart = function() {
    console.log("🎤 Mic started");
    document.getElementById('result').innerText = 'Listening... speak now';
  };

  recognition.onresult = function(event) {
    let transcript = "";
    let isFinal = false;
    
    // Collect all results
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
      isFinal = event.results[i].isFinal;
    }
    
    // Only process final results
    if (isFinal) {
      const micBtn = document.getElementById("micBtn");
      
      const recognisedText = transcript.trim();
      console.log("🎤 Recognised:", recognisedText);
      document.getElementById('result').innerText = 'Recognised: ' + recognisedText;

      // if bot prompt is picked up as speech, ignore it
      const opponent = recognisedText.toLowerCase();
      if (opponent.includes("please say your pickup") || opponent.includes("how can i help you") || opponent.includes("welcome")) {
        console.log("Ignoring assistant voice playback as user input:", recognisedText);
        return;
      }

      // If user speaks, reset the timer
      if (recognisedText) {
        addUserMessage(recognisedText);
        // DON'T use toLowerCase() for non-Latin scripts - pass raw text
        processVoiceCommand(recognisedText);
        
        // Restart timer for next input
        if (listeningTimeout) {
          clearTimeout(listeningTimeout);
        }
        listeningStartTime = Date.now();
        listeningTimeout = setTimeout(() => {
          stopListening();
        }, LISTENING_DURATION);
      }
    }
  };

  recognition.onerror = function(event) {
    console.log("Speech recognition error:", event.error);
    const resultEl = document.getElementById('result');
    resultEl.innerText = 'Speech recognition error: ' + event.error;
    addBotMessage('⚠️ Speech recognition error: ' + event.error);
    // Don't stop on errors; user can retry
  };

  recognition.onend = function() {
  if (document.getElementById("micBtn").classList.contains("listening")) {
    recognition.start(); // restart automatically
  }
};

  // ============ COMMAND PROCESSING ============
  function processVoiceCommand(rawText) {
    // Don't use toLowerCase() for non-Latin scripts
    let text = rawText.trim();
    let textLower = text.toLowerCase();

    // Ignore assistant voice prompts if they are recognized back as user text
    if (textLower.includes("please say") || textLower.includes("how can i help") || textLower === "welcome") {
      console.log("Ignored maintenance phrase:", text);
      return;
    }

    // If we're in the middle of booking, handle step-specific responses first
    if (currentBooking.step === 'date') {
      handleDateResponse(text);
      return;
    }
    
    if (currentBooking.step === 'timing') {
      handleTimingResponse(text);
      return;
    }

    if (currentBooking.step === 'driver') {
      handleDriverSelection(text);
      return;
    }

    // BOOK RIDE (multilingual keywords - case insensitive for Latin, direct match for scripts)
    if (textLower.includes("book") || textLower.includes("ride") || 
        textLower.includes("buuk") || text.includes("बुक") || 
        text.includes("বুক") || text.includes("ਬੁੱਕ") ||
        textLower.includes("buuck") || text.includes("बुक्क") ||
        textLower.includes("yatra") || text.includes("যাত্রা") || text.includes("यात्रा") ||
        text.includes("রাইড") || text.includes("राइड") ||
        text.includes("বুক করুন") || text.includes("बुक करें")) {
      handleBookRideCommand(text);
    }

    // SHOW PREVIOUS RIDES (multilingual keywords)
    else if (text.includes("previous") || text.includes("history") ||
             text.includes("पिछल") || text.includes("पुरान") ||
             text.includes("আগ") || text.includes("পুরান") ||

             text.includes("পুরানো") || text.includes("पुरानी")) {

    // SHOW DRIVERS (multilingual keywords)
    else if (textLower.includes("driver") || textLower.includes("available") ||
             text.includes("ड्राइव") || text.includes("चालक") ||
             text.includes("চালক") || text.includes("ڈرائیو") ||

      handleDriverCommand(text);

    // ADD NEW LOCATION (multilingual keywords)
    else if (textLower.includes("add location") || textLower.includes("new location") ||
             text.includes("जोड़") || text.includes("नया") ||
             text.includes("যোগ") || text.includes("নতুন") ||

  function dateToHtmlDate(dateObj) {
    if (!dateObj) return "";
    const year = dateObj.getFullYear();
    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
    const day = String(dateObj.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function timingToHtmlTime(timing) {
    if (!timing) return "";

    const clean = timing.toLowerCase();
    if (clean.includes("now")) {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    if (clean.includes("morning")) return "08:00";
    if (clean.includes("afternoon")) return "13:00";
    if (clean.includes("evening")) return "17:00";
    if (clean.includes("night")) return "20:00";

    const timeMatch = timing.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
    if (timeMatch) {
      let hour = parseInt(timeMatch[1], 10);
      const minute = timeMatch[2] ? parseInt(timeMatch[2], 10) : 0;
      const meridiem = timeMatch[3];
      if (meridiem) {
        if (meridiem.toLowerCase().includes('pm') && hour < 12) hour += 12;
        if (meridiem.toLowerCase().includes('am') && hour === 12) hour = 0;
      }
      hour = (hour % 24 + 24) % 24;
      return `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
    }
    return "";
  }

  function updateBookingStatus() {
    const status = document.getElementById('bookingStatus');
    if (!status) return;

    const pickup = currentBooking.pickup || document.getElementById('from').value || '—';
    const dropoff = currentBooking.dropoff || document.getElementById('to').value || '—';
    const date = currentBooking.dateValue || document.getElementById('date').value || '—';
    const time = currentBooking.timeValue || document.getElementById('time').value || '—';

    status.innerHTML = `<b>Detected booking</b>: ${pickup} → ${dropoff} on ${date} at ${time}`;
  }

  function setDateFromVoiceText(text) {
    text = text.trim();
    const textLower = text.toLowerCase();

    if (textLower.match(/\btoday\b/) || textLower.match(/\baj\b/) || textLower.match(/\baaj\b/) ||
        text.includes("आज") || text.includes("আজ") || text.includes("ਅੱ")) {
      currentBooking.date = "Today";
      const dateValue = dateToHtmlDate(new Date());
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      return true;
    }

    if (textLower.match(/\btomorrow\b/) || textLower.match(/\bkal\b/) || textLower.match(/\bkaal\b/) ||
        text.includes("कल") || text.includes("আগামীকাল") || text.includes("ਕੱਲ")) {
      currentBooking.date = "Tomorrow";
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dateValue = dateToHtmlDate(tomorrow);
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      return true;
    }

    if (textLower.match(/\bday after tomorrow\b/) || textLower.match(/\baftertomorrow\b/) || textLower.match(/\bparso\b/) ||
        text.includes("परसों") || text.includes("তৃতীয়দিন")) {
      currentBooking.date = "Day after tomorrow";
      const afterTomorrow = new Date();
      afterTomorrow.setDate(afterTomorrow.getDate() + 2);
      const dateValue = dateToHtmlDate(afterTomorrow);
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      return true;
    }

    const months = ["january","february","march","april","may","june","july","august","september","october","november","december"];
    for (let month of months) {
      const dateMatch = textLower.match(new RegExp(`(\\d{1,2})\\s+${month}|${month}\\s+(\\d{1,2})`, "i"));
      if (dateMatch) {
        const day = dateMatch[1] || dateMatch[2];
        currentBooking.date = `${day} ${month.charAt(0).toUpperCase() + month.slice(1)}`;
        const monthIndex = months.indexOf(month);
        const year = new Date().getFullYear();
        const candidateDate = new Date(year, monthIndex, parseInt(day, 10));
        if (!isNaN(candidateDate.getTime())) {
          const selectedDateValue = dateToHtmlDate(candidateDate);
          currentBooking.dateValue = selectedDateValue;
          document.getElementById('date').value = selectedDateValue;
          updateBookingStatus();
          return true;
        }
      }
    }

    return false;
  }

  function setTimeFromVoiceText(text) {
    text = text.trim();
    const textLower = text.toLowerCase();
    let timing = null;

    if (textLower.match(/\bnow\b/) || textLower.match(/\bforan\b/) || textLower.match(/\babhi\b/) ||
        text.includes("अभी") || text.includes("এখন") || text.includes("ਹੁਣ")) {
      timing = "Now";
    } else if (textLower.match(/\bmorning\b/) || textLower.match(/\bsabah\b/) || textLower.match(/\bsavere\b/) ||
               text.includes("सुबह") || text.includes("রাতে") || text.includes("ਸਵੇਰ")) {
      timing = "Morning (8-11 AM)";
    } else if (textLower.match(/\bafternoon\b/) || textLower.match(/\bdophar\b/) || textLower.match(/\bdupehri\b/) || textLower.match(/\bupahari\b/) ||
               text.includes("दोपहर") || text.includes("দুপুর") || text.includes("ਦੁਪਹਿਰ")) {
      timing = "Afternoon (12-3 PM)";
    } else if (textLower.match(/\bevening\b/) || textLower.match(/\bshaam\b/) || textLower.match(/\bshaaam\b/) ||
               text.includes("शाम") || text.includes("সন্ধ্যা") || text.includes("ਸ਼ਾਮ")) {
      timing = "Evening (4-7 PM)";
    } else if (textLower.match(/\bnight\b/) || textLower.match(/\brat\b/) || textLower.match(/\braat\b/) ||
               text.includes("रात") || text.includes("রাত") || text.includes("ਰਾਤ")) {
      timing = "Night (8 PM onwards)";
    } else {
      const timeMatch = textLower.match(/(\d{1,2})\s*(am|pm|a\.m|p\.m|o'?clock|oclock|:)/i);
      if (timeMatch) {
        timing = timeMatch[0];
      }
    }

    if (timing) {
      currentBooking.timing = timing;
      currentBooking.timeValue = timingToHtmlTime(timing);
      document.getElementById('time').value = currentBooking.timeValue || '';
      updateBookingStatus();
      return true;
    }

    return false;
  }

  function autoFillDateTimeFromText(text) {
    const dateFound = setDateFromVoiceText(text);
    const timeFound = setTimeFromVoiceText(text);

    if (dateFound && timeFound) {
      currentBooking.step = 'driver';
      showDriverSelection();
      return true;
    }

    if (dateFound) {
      currentBooking.step = 'timing';
      addBotMessage(t('askTime'));
      return true;
    }

    return false;
  }

  function handleDateResponse(text) {
    text = text.trim();
    const textLower = text.toLowerCase();

    // Match "today" - English and other languages
    if (textLower.match(/\btoday\b/) || textLower.match(/\baj\b/) || textLower.match(/\baaj\b/) ||
        text.includes("आज") || text.includes("আজ") || text.includes("ਅੱ")) {
      currentBooking.date = "Today";
      const dateValue = dateToHtmlDate(new Date());
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      addBotMessage(`${t('dateSet')} <b>Today</b> (<i>${dateValue}</i>)`);
      currentBooking.step = 'timing';
      setTimeout(() => {
        addBotMessage(t('askTime'));
      }, 1000);
      return;
    }
    
    // Match "tomorrow" - English and other languages
    if (textLower.match(/\btomorrow\b/) || textLower.match(/\bkal\b/) || textLower.match(/\bkaal\b/) ||
        text.includes("कल") || text.includes("আগামীকাল") || text.includes("ਕੱਲ")) {
      currentBooking.date = "Tomorrow";
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dateValue = dateToHtmlDate(tomorrow);
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      addBotMessage(`${t('dateSet')} <b>Tomorrow</b> (<i>${dateValue}</i>)`);
      currentBooking.step = 'timing';
      setTimeout(() => {
        addBotMessage(t('askTime'));
      }, 1000);
      return;
    }
    
    // Match "day after tomorrow"
    if (textLower.match(/\bday after tomorrow\b/) || textLower.match(/\baftertomorrow\b/) || textLower.match(/\bparso\b/) ||
        text.includes("परसों") || text.includes("তৃতীয়দিন")) {
      currentBooking.date = "Day after tomorrow";
      const afterTomorrow = new Date();
      afterTomorrow.setDate(afterTomorrow.getDate() + 2);
      const dateValue = dateToHtmlDate(afterTomorrow);
      currentBooking.dateValue = dateValue;
      document.getElementById('date').value = dateValue;
      updateBookingStatus();
      addBotMessage(`${t('dateSet')} <b>Day after tomorrow</b> (<i>${dateValue}</i>)`);
      currentBooking.step = 'timing';
      setTimeout(() => {
        addBotMessage(t('askTime'));
      }, 1000);
      return;
    }
    
    // Try to extract specific date (e.g., "5 april", "अप्रैल 5")
    const months = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december", 
                    "jan", "feb", "mar", "apr", "jun", "jul", "aug", "sep", "sept", "oct", "nov", "dec",
                    "जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];
    
    for (let month of months) {
      const dateMatch = textLower.match(new RegExp(`(\\d{1,2})\\s+${month}|${month}\\s+(\\d{1,2})`, "i"));
      if (dateMatch || text.includes(month)) {
        const day = dateMatch ? (dateMatch[1] || dateMatch[2]) : "";
        const monthName = month.charAt(0).toUpperCase() + month.slice(1);
        currentBooking.date = day ? `${day} ${monthName}` : monthName;

        if (day && ["january","february","march","april","may","june","july","august","september","october","november","december"].includes(month.toLowerCase())) {
          const monthIndex = ["january","february","march","april","may","june","july","august","september","october","november","december"].indexOf(month.toLowerCase());
          const year = new Date().getFullYear();
          const candidateDate = new Date(year, monthIndex, parseInt(day, 10));
          if (!isNaN(candidateDate.getTime())) {
            const selectedDateValue = dateToHtmlDate(candidateDate);
            currentBooking.dateValue = selectedDateValue;
            document.getElementById('date').value = selectedDateValue;
            addBotMessage(`${t('dateSet')} <b>${currentBooking.date}</b> (<i>${selectedDateValue}</i>)`);
          } else {
            addBotMessage(`${t('dateSet')} <b>${currentBooking.date}</b>`);
          }
        } else {
          addBotMessage(`${t('dateSet')} <b>${currentBooking.date}</b>`);
        }

        updateBookingStatus();
        currentBooking.step = 'timing';
        setTimeout(() => {
          addBotMessage(t('askTime'));
        }, 1000);
        return;
      }
    }
    
    // If no date matched, ask again
    addBotMessage(`${t('error_date')} You said: "${text}"`);
  }

  function handleTimingResponse(text) {
    let timing = null;
    text = text.trim();
    const textLower = text.toLowerCase();

    // Match "now" - English and other languages
    if (textLower.match(/\bnow\b/) || textLower.match(/\bforan\b/) || textLower.match(/\babhi\b/) ||
        text.includes("अभी") || text.includes("এখন") || text.includes("ਹੁਣ")) {
      timing = "Now";
    }
    // Match "morning" - English and other languages
    else if (textLower.match(/\bmorning\b/) || textLower.match(/\bsabah\b/) || textLower.match(/\bsavere\b/) ||
             text.includes("सुबह") || text.includes("রাতে") || text.includes("ਸਵੇਰ")) {
      timing = "Morning (8-11 AM)";
    }
    // Match "afternoon" - English and other languages
    else if (textLower.match(/\bafternoon\b/) || textLower.match(/\bdophar\b/) || textLower.match(/\bdupehri\b/) || textLower.match(/\bupahari\b/) ||
             text.includes("दोपहर") || text.includes("দুপুর") || text.includes("ਦੁਪਹਿਰ")) {
      timing = "Afternoon (12-3 PM)";
    }
    // Match "evening" - English and other languages
    else if (textLower.match(/\bevening\b/) || textLower.match(/\bshaam\b/) || textLower.match(/\bshaaam\b/) ||
             text.includes("शाम") || text.includes("সন্ধ্যা") || text.includes("ਸ਼ਾਮ")) {
      timing = "Evening (4-7 PM)";
    }
    // Match "night" - English and other languages
    else if (textLower.match(/\bnight\b/) || textLower.match(/\brat\b/) || textLower.match(/\braat\b/) ||
             text.includes("रात") || text.includes("রাত") || text.includes("ਰਾਤ")) {
      timing = "Night (8 PM onwards)";
    }
    // Try to extract specific time (e.g., "3 pm", "15:00", "3 o'clock")
    else {
      const timeMatch = textLower.match(/(\d{1,2})\s*(am|pm|a\.m|p\.m|o'?clock|oclock)/i);
      if (timeMatch) {
        timing = timeMatch[0].toUpperCase();
      }
    }

    // If timing found, show driver selection
    if (timing) {
      currentBooking.timing = timing;
      currentBooking.timeValue = timingToHtmlTime(timing);
      currentBooking.step = 'driver';
      const timeValue = currentBooking.timeValue;
      if (timeValue) {
        document.getElementById('time').value = timeValue;
      }
      updateBookingStatus();
      addBotMessage(`${t('timeSet')} <b>${timing}</b> ${timeValue ? `(picked ${timeValue})` : ''}`);
      setTimeout(() => {
        showDriverSelection();
      }, 1500);
    } else {
      // If no timing matched, ask again
      addBotMessage(`${t('error_time')} You said: "${text}". Please try: now, morning, afternoon, evening, or night`);
    }
  }

  function showDriverSelection() {
    const { pickup, dropoff, date, timing } = currentBooking;
    const topDrivers = getTopDrivers(pickup);
    
    if (topDrivers.length === 0) {
      addBotMessage(t('noDrivers') + " " + pickup + ". " + t('proceedPayment'));
      setTimeout(() => {
        proceedToPayment();
      }, 2000);
      return;
    }

    // Display in selected language with translations
    let driverList = `<b>⭐ ${t('topDrivers')} ${pickup}:</b><br><br>`;
    topDrivers.forEach((driver, index) => {
      driverList += `<b>${index + 1}. ${driver.name}</b> - ⭐${driver.rating}/5.0<br>📞 ${driver.phone}<br><br>`;
    });
    
    // Add multilingual instruction
    driverList += `${t('saySelect')}`;
    addBotMessage(driverList);
  }

  function handleDriverSelection(text) {
    text = text.trim();  // Don't use toLowerCase - numbers are unaffected and this preserves non-Latin script
    const textLower = text.toLowerCase();
    const { pickup } = currentBooking;
    const topDrivers = getTopDrivers(pickup);
    
    // Extract driver number (1, 2, 3, etc.)
    const numberMatch = textLower.match(/\b([1-9])\b/);
    
    if (numberMatch) {
      const driverIndex = parseInt(numberMatch[1]) - 1;
      
      if (driverIndex >= 0 && driverIndex < topDrivers.length) {
        const selectedDriver = topDrivers[driverIndex];
        currentBooking.driver = selectedDriver.name;
        
        // Use multilingual translations
        addBotMessage(`✅ <b>${t('driverSelected')} ${selectedDriver.name}</b>\n⭐ ${t('rating')} ${selectedDriver.rating}/5.0\n📞 ${t('phone')}: ${selectedDriver.phone}`);
        
        setTimeout(() => {
          proceedToPayment();
        }, 2000);
        return;
      }
    }
    
    addBotMessage(`❌ ${t('error_understand')} "${t('saySelect')}\"`);
  }

  function proceedToPayment() {
    const { pickup, dropoff, date, timing, driver } = currentBooking;

    // Store ride details
    const rideDetails = {
      from: pickup,
      to: dropoff,
      date: date,
      timing: timing,
      driver: driver || "Not Selected",
      scheduledDate: new Date().toISOString(),
      amount: 250
    };

    previousRides.push(rideDetails);
    localStorage.setItem('previousRides', JSON.stringify(previousRides));
    localStorage.setItem('rideFrom', pickup);
    localStorage.setItem('rideTo', dropoff);
    localStorage.setItem('rideDate', date);
    localStorage.setItem('rideTiming', timing);
    localStorage.setItem('rideDriver', driver || "Not Selected");

    let confirmationMsg = `✅ <b>${t('confirmed')}</b>\n\n${t('from')} ${pickup}\n${t('to')} ${dropoff}\n${t('date')} ${date}\n${t('time')} ${timing}`;
    
    if (driver) {
      confirmationMsg += `\n🚖 Driver: ${driver}`;
    }
    
    confirmationMsg += `\n\n${t('proceedPayment')}`;
    addBotMessage(confirmationMsg);

    setTimeout(() => {
      // Fill form
      document.getElementById("from").value = pickup;
      document.getElementById("to").value = dropoff;
      if (currentBooking.dateValue) document.getElementById("date").value = currentBooking.dateValue;
      if (currentBooking.timeValue) document.getElementById("time").value = currentBooking.timeValue;
      
      // Navigate to payment
      localStorage.setItem('rideAmount', '250');
      window.location.href = 'payment.html?from=' + encodeURIComponent(pickup) + 
                             '&to=' + encodeURIComponent(dropoff) + 
                             '&date=' + encodeURIComponent(date) +
                             '&timing=' + encodeURIComponent(timing) +
                             '&distance=12 km&duration=25 mins&amount=250';
    }, 2000);

    // Reset booking state
    currentBooking = {
      pickup: null,
      dropoff: null,
      date: null,
      timing: null,
      driver: null,
      step: null
    };
  }

  // ============ DRIVER MANAGEMENT ============
  function getTopDrivers(location) {
    if (driverDatabase[location]) {
      return driverDatabase[location].sort((a, b) => b.rating - a.rating);
    }
    return [];
  }

  function handleDriverCommand(text) {
    let location = "";
    allLocations.forEach(loc => {
      if (text.includes(loc.toLowerCase())) {
        location = loc;
      }
    });

    if (!location) {
      addBotMessage("Which area? " + allLocations.join(", "));
      return;
    }

    const topDrivers = getTopDrivers(location);
    if (topDrivers.length === 0) {
      addBotMessage(t('noDrivers') + " " + location);
      return;
    }

    let response = `<b>⭐ ${t('topDrivers')} ${location}:</b><br><br>`;
    topDrivers.forEach((driver, index) => {
      response += `${index + 1}. ${driver.name} - ⭐${driver.rating}/5.0 (${driver.phone})<br><br>`;
    });

    addBotMessage(response);
  }

  // ============ PREVIOUS RIDES ============
  function showPreviousRides() {
    if (previousRides.length === 0) {
      addBotMessage(t('prevRides'));
      return;
    }

    let response = `<b>${t('prevRidesTitle')}</b><br><br>`;
    previousRides.slice(-5).reverse().forEach((ride, index) => {
      response += `${index + 1}. ${ride.from} → ${ride.to}<br>`;
    });
    response += `<br>${t('rebook')}`;

    addBotMessage(response);
  }

  function handleRebookCommand() {
    if (previousRides.length === 0) {
      addBotMessage(t('noPrevRides'));
      return;
    }

    const lastRide = previousRides[previousRides.length - 1];
    bookRideWithVoice(lastRide.from, lastRide.to);
  }

  // ============ ADD LOCATION ============
  function handleAddLocation(text) {
    // Extract potential location name
    const words = text.split(" ");
    const textLower = text.toLowerCase();
    let newLocation = "";
    
    // Try to extract new location - support both Latin and non-Latin searches
    if (textLower.includes("add location") || textLower.includes("add") ||
        text.includes("जोड़") || text.includes("যোগ") || 
        text.includes("ਜੋੜ") || text.includes("ചേർ")) {
      const idx = words.findIndex((w, i, arr) => w.toLowerCase() === "location" || arr[i-1]?.toLowerCase() === "add") + 1;
      if (idx > 0 && idx < words.length) {
        newLocation = words.slice(idx).join(" ").trim();
      }
    }

    if (newLocation && !allLocations.includes(newLocation)) {
      if (addLocation(newLocation)) {
        addBotMessage(`✅ ${t('locationAdded')} ${newLocation}`);
      }
    } else {
      addBotMessage(t('addLocationExample'));
    }
  }

  // ============ SEARCH & BOOK FUNCTIONS ============
  function searchRide() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!from || !to) {
      alert("Please select both locations");
      return;
    }

    document.getElementById("result").innerText = `Searching rides from ${from} to ${to}...`;
    showDrivers(from);
  }

  function bookRide() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!from || !to) {
      alert("Please select both pickup and drop locations");
      return;
    }

    bookRideWithVoice(from, to);
  }

  function showDrivers(location) {
    const topDrivers = getTopDrivers(location);
    let html = "<b>⭐ Available Drivers:</b><br>";
    
    if (topDrivers.length === 0) {
      html = "No drivers available";
    } else {
      topDrivers.forEach(d => {
        html += `🚖 ${d.name} ⭐${d.rating} (${d.phone})<br>`;
      });
    }

    document.getElementById("result").innerHTML = html;
  }

      helpModal.classList.remove("active");
